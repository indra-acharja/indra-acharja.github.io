<style>
/* ── Custom post header injected by JS ── */
.custom-post-header {
  padding-top: 5rem;
  padding-bottom: 1.2rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid #e0dcd6;
}
.custom-post-header h1 {
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 2.4rem;
  font-weight: 700;
  color: #1a3a2a;
  line-height: 1.25;
  margin: 0 0 0.5rem 0;
}
.custom-post-header p.post-desc {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  color: #6b6458;
  font-style: italic;
  margin: 0;
}
/* ── Author/date at bottom ── */
.post-meta-bottom {
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  color: #7a7060;
  margin-bottom: 1.2rem;
}
/* ── Share bar ── */
.post-social-bar {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid #e0dcd6;
  font-family: 'Outfit', sans-serif;
}
.post-share-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 0.8rem;
}
.share-label {
  font-size: 0.82rem;
  color: #7a7060;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 0.3rem;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid #ccc8c0;
  background: transparent;
  color: #444;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s ease;
  font-family: 'Outfit', sans-serif;
}
.share-btn:hover { border-color: #2a6b7c; color: #2a6b7c; background: #edf5f7; }
.share-btn.copied { border-color: #3a7c3a; color: #3a7c3a; background: #edf5ed; }
.like-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: none;
  border: 1.5px solid #ccc8c0;
  border-radius: 20px;
  padding: 0.3rem 0.85rem;
  font-size: 0.88rem;
  color: #666;
  cursor: pointer;
  transition: all 0.18s ease;
  font-family: 'Outfit', sans-serif;
  margin-left: auto;
}
.like-btn:hover { border-color: #c0392b; color: #c0392b; }
.like-btn.liked { border-color: #c0392b; color: #c0392b; background: #fdf0ee; }
.like-btn .heart { font-size: 1rem; }
.post-comments-section {
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid #e0dcd6;
}
.post-comments-section h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: #2c2820;
  margin-bottom: 1.2rem;
}
</style>

<div class="post-meta-bottom" id="post-meta-bottom"></div>

<div class="post-social-bar">
  <div class="post-share-row">
    <span class="share-label">Share</span>
    <button class="share-btn" onclick="shareToFacebook()" title="Share on Facebook">f</button>
    <button class="share-btn" onclick="shareToX()" title="Share on X" style="font-family:serif;">𝕏</button>
    <button class="share-btn" onclick="shareToLinkedIn()" title="Share on LinkedIn" style="font-size:0.78rem;">in</button>
    <button class="share-btn" id="copyBtn" onclick="copyLink()" title="Copy link">🔗</button>
    <button class="like-btn" id="likeBtn" onclick="toggleLike()">
      <span class="heart" id="likeHeart">♡</span>
      <span id="likeCount">0</span>
    </button>
  </div>
</div>

<div class="post-comments-section">
  <h3>Comments</h3>
  <script src="https://giscus.app/client.js"
    data-repo="indra-acharja/indra-acharja.github.io"
    data-repo-id="R_kgDOSY2FUg"
    data-category="Announcements"
    data-category-id="DIC_kwDOSY2FUs4C8qpV"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="light"
    data-lang="en"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</div>

<script>
(function() {
  // ── Build custom post header from Quarto's hidden title block ──
  var titleBlock = document.querySelector('#title-block-header');
  var mainEl = document.querySelector('main.content') ||
               document.querySelector('#quarto-document-content') ||
               document.querySelector('main');

  if (titleBlock && mainEl) {
    var titleEl   = titleBlock.querySelector('h1.title');
    var descEl    = titleBlock.querySelector('.description');
    var metaEl    = titleBlock.querySelector('.quarto-title-meta');

    // Build custom header
    var header = document.createElement('div');
    header.className = 'custom-post-header';

    if (titleEl) {
      var h1 = document.createElement('h1');
      h1.textContent = titleEl.textContent;
      header.appendChild(h1);
    }
    if (descEl) {
      var p = document.createElement('p');
      p.className = 'post-desc';
      p.textContent = descEl.textContent;
      header.appendChild(p);
    }

    // Insert custom header as first child of main
    mainEl.insertBefore(header, mainEl.firstChild);

    // Move author/date to bottom as single "By Name · Date" line
    var bottomEl = document.getElementById('post-meta-bottom');
    if (metaEl && bottomEl) {
      var dateEl   = metaEl.querySelector('p.date');
      var authorEl = metaEl.querySelector('.quarto-title-meta-contents p:not(.date)');
      var authorName = authorEl ? authorEl.textContent.trim() : '';
      var dateStr    = dateEl   ? dateEl.textContent.trim()   : '';
      var parts = [];
      if (authorName) parts.push('By ' + authorName);
      if (dateStr)    parts.push(dateStr);
      bottomEl.textContent = parts.join(' · ');
    }

    // Hide original title block
    titleBlock.style.cssText = 'display:none!important';
  }

  // ── Like button ──
  var pageKey = 'like_' + window.location.pathname;
  var count = parseInt(localStorage.getItem(pageKey + '_count') || '0');
  var liked = localStorage.getItem(pageKey + '_liked') === 'true';

  function renderLike() {
    var btn = document.getElementById('likeBtn');
    var heart = document.getElementById('likeHeart');
    var cntEl = document.getElementById('likeCount');
    if (!btn) return;
    cntEl.textContent = count;
    if (liked) { btn.classList.add('liked'); heart.textContent = '♥'; }
    else        { btn.classList.remove('liked'); heart.textContent = '♡'; }
  }

  window.toggleLike = function() {
    if (liked) { liked = false; count = Math.max(0, count - 1); }
    else        { liked = true; count++; }
    localStorage.setItem(pageKey + '_liked', liked);
    localStorage.setItem(pageKey + '_count', count);
    renderLike();
  };
  renderLike();

  // ── Share helpers ──
  window.shareToFacebook = function() {
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank', 'width=600,height=400');
  };
  window.shareToX = function() {
    window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(window.location.href) + '&text=' + encodeURIComponent(document.title), '_blank', 'width=600,height=400');
  };
  window.shareToLinkedIn = function() {
    window.open('https://www.linkedin.com/shareArticle?mini=true&url=' + encodeURIComponent(window.location.href), '_blank', 'width=600,height=500');
  };
  window.copyLink = function() {
    navigator.clipboard.writeText(window.location.href).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✓'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '🔗'; btn.classList.remove('copied'); }, 2000);
    });
  };
})();
</script>
